{#
Inline Edit Mode - adds select/delete functionality to any gallery grid.
Include this partial at the bottom of pages that have .wm-tile elements.
Requires gallery_utils.js and batch_actions.js to be loaded.

Usage: {% include 'partials/inline_edit.html' %}
#}

<style>
    /* Inline edit mode styles */
    .inline-edit-active .wm-tile,
    .inline-edit-active [data-batch-target] {
        position: relative;
    }

    .wm-tile .inline-edit-checkbox,
    [data-batch-target] .inline-edit-checkbox {
        display: none;
        position: absolute;
        top: 6px;
        left: 6px;
        z-index: 10;
        width: 18px;
        height: 18px;
        accent-color: var(--color-primary, #a78bfa);
        cursor: pointer;
    }

    .inline-edit-active .wm-tile .inline-edit-checkbox,
    .inline-edit-active [data-batch-target] .inline-edit-checkbox {
        display: block;
    }

    .inline-edit-active .wm-tile[data-batch-target],
    .inline-edit-active [data-batch-target] {
        cursor: pointer;
    }

    .inline-edit-active .wm-tile[data-batch-target].selected,
    .inline-edit-active [data-batch-target].selected {
        outline: 3px solid var(--color-primary, #a78bfa);
        outline-offset: -3px;
        opacity: 0.85;
    }

    .inline-edit-footer {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        padding: 10px 20px;
        background: rgba(26, 29, 35, 0.95);
        border-top: 1px solid rgba(167, 139, 250, 0.3);
        backdrop-filter: blur(8px);
        justify-content: center;
        align-items: center;
        gap: 12px;
    }

    .inline-edit-footer.visible {
        display: flex;
    }

    .inline-edit-footer .counter {
        color: rgba(255, 255, 255, 0.7);
        font-size: var(--font-size-sm);
    }

    .inline-edit-footer .btn {
        font-size: var(--font-size-sm);
        padding: 6px 16px;
    }
</style>

<div class="inline-edit-footer" id="inlineEditFooter">
    <span class="counter" id="inlineEditCounter">0 selected</span>
    <button type="button" class="btn btn--danger" onclick="inlineEditTrash()">🗑 Move to Trash</button>
    <button type="button" class="btn btn--outline-danger" id="inlineRejectAllBtn" onclick="inlineEditTrashAllFiltered()"
        style="display:none;">⚠️ Reject All Filtered</button>
    <button type="button" class="btn btn--primary" onclick="inlineEditRelabel()">🏷️ Relabel Selected</button>
    <button type="button" class="btn btn--outline-primary" id="inlineRelabelAllBtn"
        onclick="inlineEditRelabelAllFiltered()" style="display:none;">🏷️ Relabel All Filtered</button>
    <button type="button" class="btn btn--secondary" onclick="inlineEditCancel()">Cancel</button>
</div>

<script>
    (function () {
        let editMode = false;
        let lastClickedIndex = null;

        // Show filter-dependent buttons if filter context is available
        if (window.INLINE_EDIT_FILTER_CONTEXT) {
            var allBtn = document.getElementById('inlineRejectAllBtn');
            if (allBtn) allBtn.style.display = '';
            var relabelAllBtn = document.getElementById('inlineRelabelAllBtn');
            if (relabelAllBtn) relabelAllBtn.style.display = '';
        }

        // Toggle edit mode
        window.toggleInlineEdit = function (btn) {
            editMode = !editMode;
            var pageRoot = document.querySelector('.species-grid, .gallery-grid, #subgallery-grid');
            if (!pageRoot) pageRoot = document.body;

            if (editMode) {
                pageRoot.classList.add('inline-edit-active');
                btn.classList.add('active');
                btn.textContent = '✏️ Done';
                lastClickedIndex = null;

                // Add checkboxes to all batch-target elements
                var targets = document.querySelectorAll('[data-batch-target="detection"][data-detection-id]');
                targets.forEach(function (tile, idx) {
                    tile.dataset.editIndex = idx;
                    if (!tile.querySelector('.inline-edit-checkbox')) {
                        const cb = document.createElement('input');
                        cb.type = 'checkbox';
                        cb.className = 'inline-edit-checkbox';
                        cb.value = tile.dataset.detectionId;
                        cb.dataset.detectionId = tile.dataset.detectionId;
                        cb.addEventListener('click', e => e.stopPropagation());
                        cb.addEventListener('change', updateInlineCounter);
                        tile.prepend(cb);
                    }
                });

                // Make targets clickable to toggle selection (with Shift+Click range)
                targets.forEach(function (tile) {
                    tile._inlineEditClick = function (e) {
                        if (e.target.closest('.wm-tile__button, .obs-filmstrip__button')) {
                            e.preventDefault();
                            e.stopPropagation();
                        }
                        const cb = tile.querySelector('.inline-edit-checkbox');
                        if (!cb) return;

                        const currentIdx = parseInt(tile.dataset.editIndex);

                        if (e.target !== cb) {
                            cb.checked = !cb.checked;
                        }

                        // Shift+Click range selection
                        if (e.shiftKey && lastClickedIndex !== null) {
                            var allTargets = Array.from(document.querySelectorAll('[data-batch-target="detection"]'));
                            const minIdx = Math.min(lastClickedIndex, currentIdx);
                            const maxIdx = Math.max(lastClickedIndex, currentIdx);
                            for (var i = minIdx; i <= maxIdx; i++) {
                                var t = allTargets[i];
                                if (t) {
                                    var tcb = t.querySelector('.inline-edit-checkbox');
                                    if (tcb) {
                                        tcb.checked = cb.checked;
                                        t.classList.toggle('selected', cb.checked);
                                    }
                                }
                            }
                        }

                        lastClickedIndex = currentIdx;
                        tile.classList.toggle('selected', cb.checked);
                        updateInlineCounter();
                    };
                    tile.addEventListener('click', tile._inlineEditClick, true);
                });

                document.getElementById('inlineEditFooter').classList.add('visible');
            } else {
                exitEditMode(pageRoot, btn);
            }
        };

        function exitEditMode(container, btn) {
            editMode = false;

            if (container) container.classList.remove('inline-edit-active');

            // Remove click handlers and deselect on all batch targets
            document.querySelectorAll('[data-batch-target="detection"]').forEach(function (tile) {
                if (tile._inlineEditClick) {
                    tile.removeEventListener('click', tile._inlineEditClick, true);
                    delete tile._inlineEditClick;
                }
                tile.classList.remove('selected');
                var cb = tile.querySelector('.inline-edit-checkbox');
                if (cb) cb.checked = false;
            });

            document.getElementById('inlineEditFooter').classList.remove('visible');

            // Reset button
            if (!btn) btn = document.querySelector('.inline-edit-toggle');
            if (btn) {
                btn.classList.remove('active');
                btn.textContent = '✏️ Edit';
            }
        }

        function updateInlineCounter() {
            const checked = document.querySelectorAll('.inline-edit-checkbox:checked');
            document.getElementById('inlineEditCounter').textContent = checked.length + ' selected';
        }

        // --- Batch Reject via Moderation API ---
        window.inlineEditTrash = async function () {
            const selection = WmBatchActions.getExplicitSelection('.inline-edit-checkbox');
            const result = await WmBatchActions.runBatchAction(
                'Move to Trash',
                selection,
                '/api/moderation/bulk/reject'
            );

            if (result.success) {
                // Remove tiles with animation
                const checked = document.querySelectorAll('.inline-edit-checkbox:checked');
                checked.forEach(cb => {
                    const tile = cb.closest('.wm-tile');
                    if (tile) {
                        tile.style.transition = 'opacity 0.3s, transform 0.3s';
                        tile.style.opacity = '0';
                        tile.style.transform = 'scale(0.8)';
                        setTimeout(() => tile.remove(), 320);
                    }
                });

                setTimeout(updateInlineCounter, 350);
                if (window.wmToast) {
                    window.wmToast(
                        (result.data.rejected_count || selection.ids.length) + ' items moved to trash',
                        'success', 3000
                    );
                }
            }
        };

        // --- Reject All Filtered via Moderation API ---
        window.inlineEditTrashAllFiltered = async function () {
            if (!window.INLINE_EDIT_FILTER_CONTEXT || typeof WmBatchActions === 'undefined') {
                alert('Filter context not available.');
                return;
            }

            const selection = WmBatchActions.buildFilterContext(
                window.INLINE_EDIT_FILTER_CONTEXT.surface,
                window.INLINE_EDIT_FILTER_CONTEXT
            );
            const result = await WmBatchActions.runBatchAction(
                '⚠️ Reject All Filtered',
                selection,
                '/api/moderation/bulk/reject'
            );

            if (result.success) {
                if (window.wmToast) {
                    window.wmToast(
                        (result.data.rejected_detections || 0) + ' items moved to trash',
                        'success', 3000
                    );
                }
                setTimeout(function () { location.reload(); }, 1500);
            }
        };

        // --- Batch Relabel Selected via Moderation API ---
        window.inlineEditRelabel = async function () {
            var selection = WmBatchActions.getExplicitSelection('.inline-edit-checkbox');
            await WmBatchActions.runBatchRelabel(selection);
        };

        // --- Batch Relabel All Filtered via Moderation API ---
        window.inlineEditRelabelAllFiltered = async function () {
            if (!window.INLINE_EDIT_FILTER_CONTEXT || typeof WmBatchActions === 'undefined') {
                alert('Filter context not available.');
                return;
            }

            var selection = WmBatchActions.buildFilterContext(
                window.INLINE_EDIT_FILTER_CONTEXT.surface,
                window.INLINE_EDIT_FILTER_CONTEXT
            );
            await WmBatchActions.runBatchRelabel(selection);
        };

        window.inlineEditCancel = function () {
            exitEditMode();
        };
    })();
</script>
