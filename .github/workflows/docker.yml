name: Docker

on:
  schedule:
    - cron: '0 3 * * *'   # every night at 03:00 UTC (1h after RPi build)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read App Version
        id: version
        run: |
          # Use APP_VERSION as the stable Docker tag for the current code.
          VERSION=$(bash scripts/version_info.sh release-base . 2>/dev/null || echo "0.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: starminworks/watchmybirds
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=starminworks/watchmybirds:buildcache
          cache-to: type=registry,ref=starminworks/watchmybirds:buildcache,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.run_started_at }}
            GIT_COMMIT=${{ github.sha }}
            VERSION=${{ steps.version.outputs.version }}

      - name: Update GitHub Release with Docker info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Find the latest non-prerelease release tag
          TAG=$(gh release list --repo "${{ github.repository }}" --limit 10 \
            --json tagName,isPrerelease \
            --jq '[.[] | select(.isPrerelease == false)] | .[0].tagName // empty')

          if [ -z "$TAG" ]; then
            echo "No release found to attach Docker info to, skipping."
            exit 0
          fi

          echo "Attaching Docker info to release ${TAG}..."

          # Append Docker pull instructions to existing release notes
          EXISTING=$(gh release view "$TAG" --repo "${{ github.repository }}" --json body -q .body)
          read -r -d '' DOCKER_SECTION << 'DOCKEREOF' || true
---

### Docker

```bash
docker pull starminworks/watchmybirds:PLACEHOLDER_DOCKER_VER
docker pull starminworks/watchmybirds:latest
```

**Platforms:** linux/amd64, linux/arm64
DOCKEREOF
          DOCKER_SECTION="${DOCKER_SECTION//PLACEHOLDER_DOCKER_VER/${VERSION}}"

          # Only append if not already present
          if echo "$EXISTING" | grep -q "docker pull starminworks/watchmybirds"; then
            echo "Docker section already present in release notes, skipping."
          else
            printf '%s\n%s' "$EXISTING" "$DOCKER_SECTION" > updated_notes.md
            gh release edit "$TAG" \
              --repo "${{ github.repository }}" \
              --notes-file updated_notes.md
          fi
