name: Docker

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA). Leave empty for the current branch."
        required: false
        default: ""
      publish_latest:
        description: "Also publish the image as :latest"
        required: false
        type: boolean
        default: true
      create_github_release:
        description: "Create/update the dated GitHub docker release entry"
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Read App Version
        id: version
        run: |
          # Resolve the actual release base even if APP_VERSION currently holds
          # a next-patch dev prerelease such as 0.1.1-dev.abc1234.
          VERSION=$(bash scripts/version_info.sh release-base . 2>/dev/null || echo "0.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: starminworks/watchmybirds
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha
            type=raw,value=latest,enable=${{ inputs.publish_latest }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=starminworks/watchmybirds:buildcache
          cache-to: type=registry,ref=starminworks/watchmybirds:buildcache,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.run_started_at }}
            GIT_COMMIT=${{ github.sha }}
            VERSION=${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        if: ${{ inputs.create_github_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          VERSION="${{ steps.version.outputs.version }}"
          TAG="docker-${DATE}-${VERSION}"

          # Create Release Notes File (content at column 0 to avoid Markdown indentation issues)
          cat > release_notes.md << 'RELEASE_EOF'
          ## WatchMyBirds Docker Image
          
          **Version:** PLACEHOLDER_VERSION
          **Build Date:** PLACEHOLDER_DATE
          **Commit:** PLACEHOLDER_COMMIT
          
          ### Docker Hub
          ```bash
          docker pull starminworks/watchmybirds:PLACEHOLDER_VERSION
          docker pull starminworks/watchmybirds:latest
          ```
          
          ### Platforms
          - `linux/amd64` (x86_64)
          - `linux/arm64` (Raspberry Pi, Apple Silicon)
          
          See [Docker Setup Guide](https://github.com/PLACEHOLDER_REPO#docker) for usage instructions.
          RELEASE_EOF
          sed -i "s/PLACEHOLDER_VERSION/${VERSION}/g" release_notes.md
          sed -i "s/PLACEHOLDER_DATE/${DATE}/g" release_notes.md
          sed -i "s/PLACEHOLDER_COMMIT/${{ github.sha }}/g" release_notes.md
          sed -i "s|PLACEHOLDER_REPO|${{ github.repository }}|g" release_notes.md

          # Create Release if not exists
          gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "🐳 Docker Image – ${DATE} (${VERSION})" \
              --notes-file release_notes.md \
              --generate-notes

          if [[ "${{ inputs.publish_latest }}" == "true" ]]; then
            gh release edit "$TAG" --repo "${{ github.repository }}" --latest
            bash scripts/cleanup_releases.sh "${{ github.repository }}" "docker-" 5
          fi
