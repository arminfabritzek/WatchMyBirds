name: Docker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Read App Version
        id: version
        run: |
          # Manual fallback: rebuild the latest stable Docker release tag.
          VERSION=$(bash scripts/version_info.sh current-release . 2>/dev/null || true)
          if [ -z "$VERSION" ]; then
            echo "::error::No stable release version found. Run the release workflow first."
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: starminworks/watchmybirds
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=starminworks/watchmybirds:buildcache
          cache-to: type=registry,ref=starminworks/watchmybirds:buildcache,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.run_started_at }}
            GIT_COMMIT=${{ github.sha }}
            VERSION=${{ steps.version.outputs.version }}

      - name: Update Matching GitHub Release with Docker Info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          if [ -z "$TAG" ]; then
            echo "No release found to attach Docker info to, skipping."
            exit 0
          fi

          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${TAG} not found, skipping."
            exit 0
          fi

          echo "Attaching Docker info to release ${TAG}..."

          # Append Docker pull instructions to existing release notes
          EXISTING=$(gh release view "$TAG" --repo "${{ github.repository }}" --json body -q .body)

          # Build Docker section as a file to avoid YAML/backtick issues
          {
            echo "---"
            echo ""
            echo "### Docker"
            echo ""
            echo '```bash'
            echo "docker pull starminworks/watchmybirds:${VERSION}"
            echo "docker pull starminworks/watchmybirds:latest"
            echo '```'
            echo ""
            echo "**Platforms:** linux/amd64, linux/arm64"
          } > docker_section.md

          # Only append if not already present
          if echo "$EXISTING" | grep -q "docker pull starminworks/watchmybirds"; then
            echo "Docker section already present in release notes, skipping."
          else
            { echo "$EXISTING"; cat docker_section.md; } > updated_notes.md
            gh release edit "$TAG" \
              --repo "${{ github.repository }}" \
              --notes-file updated_notes.md
          fi
