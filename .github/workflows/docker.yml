name: Docker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      DOCKER_BUILD_SUMMARY: false
      DOCKER_BUILD_RECORD_UPLOAD: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Read App Version
        id: version
        run: |
          # Manual fallback: rebuild the latest stable Docker release tag.
          VERSION=$(bash scripts/version_info.sh current-release . 2>/dev/null || true)
          if [ -z "$VERSION" ]; then
            echo "::error::No stable release version found. Run the release workflow first."
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: starminworks/watchmybirds
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=starminworks/watchmybirds:buildcache
          cache-to: type=registry,ref=starminworks/watchmybirds:buildcache,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.run_started_at }}
            GIT_COMMIT=${{ github.sha }}
            VERSION=${{ steps.version.outputs.version }}

      - name: Update Matching GitHub Release with Docker Info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          if [ -z "$TAG" ]; then
            echo "No release found to attach Docker info to, skipping."
            exit 0
          fi

          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${TAG} not found, skipping."
            exit 0
          fi

          echo "Attaching Docker info to release ${TAG}..."

          # Append Docker pull instructions to existing release notes
          EXISTING=$(gh release view "$TAG" --repo "${{ github.repository }}" --json body -q .body)

          # Build Docker section as a file to avoid YAML/backtick issues
          {
            echo "---"
            echo ""
            echo "### Docker"
            echo ""
            echo '```bash'
            echo "docker pull starminworks/watchmybirds:${VERSION}"
            echo "docker pull starminworks/watchmybirds:latest"
            echo '```'
            echo ""
            echo "**Platforms:** linux/amd64, linux/arm64"
          } > docker_section.md

          # Only append if not already present
          if echo "$EXISTING" | grep -q "docker pull starminworks/watchmybirds"; then
            echo "Docker section already present in release notes, skipping."
          else
            { echo "$EXISTING"; cat docker_section.md; } > updated_notes.md
            gh release edit "$TAG" \
              --repo "${{ github.repository }}" \
              --notes-file updated_notes.md
          fi
