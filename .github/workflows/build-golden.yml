name: Build Golden Image

on:

  workflow_dispatch:

jobs:
  build-golden:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Image Build Dependencies
        run: sudo apt-get update && sudo apt-get install -y xz-utils parted qemu-user-static

      - name: Build Golden Base Image
        run: bash scripts/build_golden_image.sh .

      - name: Write Build Summary
        run: |
          {
            echo "## Golden Base Image"
            echo
            echo "- Output: \`golden.img\`"
            echo "- Base OS: Raspberry Pi OS Lite 64-bit (Trixie)"
            echo "- Storage: none"
            echo "- Purpose: validate the same on-demand base-image build used by DEV and release workflows"
            echo "- This workflow no longer uploads a persistent GitHub Actions artifact."
          } >> "$GITHUB_STEP_SUMMARY"
