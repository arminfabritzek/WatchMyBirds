name: Docker Quick Build

on:
  workflow_dispatch:
    inputs:
      extra_tag:
        description: Optional extra Docker tag alias (for example test-rpi)
        required: false
        default: ""
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOCKER_BUILD_SUMMARY: false
      DOCKER_BUILD_RECORD_UPLOAD: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve dev image tags
        id: vars
        env:
          EXTRA_TAG_INPUT: ${{ github.event.inputs.extra_tag }}
        run: |
          set -euo pipefail

          DEV_VERSION=$(bash scripts/version_info.sh dev-version . "${GITHUB_SHA}")
          SHORT_SHA="$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)"
          BRANCH_SLUG="$(printf '%s' "${GITHUB_REF_NAME}" \
            | tr '/_' '-' \
            | tr -cs '[:alnum:].-' '-' \
            | sed 's/^-*//; s/-*$//')"

          if [ -z "${BRANCH_SLUG}" ]; then
            BRANCH_SLUG="manual"
          fi

          EXTRA_TAG="$(printf '%s' "${EXTRA_TAG_INPUT}" \
            | tr '/_' '-' \
            | tr -cs '[:alnum:].-' '-' \
            | sed 's/^-*//; s/-*$//')"

          {
            echo "dev_version=${DEV_VERSION}"
            echo "short_sha=${SHORT_SHA}"
            echo "branch_slug=${BRANCH_SLUG}"
            echo "extra_tag=${EXTRA_TAG}"
            echo "tags<<EOF"
            echo "starminworks/watchmybirds:${DEV_VERSION}"
            echo "starminworks/watchmybirds:dev-${BRANCH_SLUG}"
            echo "starminworks/watchmybirds:sha-${SHORT_SHA}"
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "starminworks/watchmybirds:edge"
            fi
            if [ -n "${EXTRA_TAG}" ]; then
              echo "starminworks/watchmybirds:${EXTRA_TAG}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push quick Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=starminworks/watchmybirds:buildcache
          cache-to: type=registry,ref=starminworks/watchmybirds:buildcache,mode=max
          tags: ${{ steps.vars.outputs.tags }}
          build-args: |
            BUILD_DATE=${{ github.run_started_at }}
            GIT_COMMIT=${{ github.sha }}
            VERSION=${{ steps.vars.outputs.dev_version }}

      - name: Write job summary
        env:
          PUSHED_TAGS: ${{ steps.vars.outputs.tags }}
        run: |
          {
            echo "## Docker Quick Build"
            echo ""
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Commit: \`${{ steps.vars.outputs.short_sha }}\`"
            echo "- Version: \`${{ steps.vars.outputs.dev_version }}\`"
            echo ""
            echo "### Pushed tags"
            echo ""
            printf '%s\n' "${PUSHED_TAGS}" | while IFS= read -r tag; do
              [ -n "${tag}" ] && echo "- \`${tag}\`"
            done
          } >> "${GITHUB_STEP_SUMMARY}"
