name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      # Reported but not blocking: the tree carries two pre-existing findings
      # that are unrelated to the test gate. Flip to a hard failure once they
      # are cleared, so lint regressions start blocking too.
      - name: Lint
        continue-on-error: true
        run: ruff check .

      # host_env covers tests asserting on the host's mount table or on civil
      # twilight at the station's coordinates. They pass on a developer machine
      # and on the appliance, but a hosted runner has neither.
      - name: Run test suite
        run: pytest -q -m "not host_env"
